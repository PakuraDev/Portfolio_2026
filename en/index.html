<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pezetoide's Portfolio</title>
    <meta name="description" content="Pezetoide's Portfolio">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/header_footer.css">
    <link rel="stylesheet" href="../css/paginas.css">
    <link rel="stylesheet" href="../css/cards.css">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Web Components -->
    <script type="module" src="./webcomponents/header.js"></script>
    <script type="module" src="./webcomponents/footer.js"></script>
</head>
<body>
    <!-- Background Canvas -->
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
    </div>
    <div id="ambient-glow"></div>

    <app-header></app-header>

    <main id="main-content" style="position: relative; z-index: 2;">
        <!-- Introduction -->
        <section class="home-intro">
            <div class="home-intro-content">
                <p class="text-p-large text-negro">Alejandro Pérez · Seville</p>
                <div class="home-intro-titles">
                    <h1 class="text-h1 text-negro">I design interfaces.</h1>
                    <h1 class="text-h1 text-negro">I write code.</h1>
                    <h1 class="text-h1 text-azul">I ship real products.</h1>
                </div>
            </div>
            <div class="gradient-mask"></div>
        </section>

        <!-- Selector -->
        <section class="home-selector" id="home-selector-section">
            <div class="home-selector-inner">
                <h4 class="text-h4 text-negro selector-main-title">What would you like to know about me?</h4>
                <div class="home-selector-options">
                    <div class="selector-option active" data-target="Summary" tabindex="0" role="button">
                        <h4 class="text-h4 selector-num">01</h4>
                        <h1 class="text-h1 selector-text">Summary</h1>
                    </div>
                    <div class="selector-option" data-target="My projects" tabindex="0" role="button">
                        <h4 class="text-h4 selector-num">02</h4>
                        <h1 class="text-h1 selector-text">My projects</h1>
                    </div>
                    <div class="selector-option" data-target="About me" tabindex="0" role="button">
                        <h4 class="text-h4 selector-num">03</h4>
                        <h1 class="text-h1 selector-text">About me</h1>
                    </div>
                </div>
            </div>
        </section>

        <!-- Separator: 4 waves in a row [mirror][normal][mirror][normal] for bidirectional scrolling -->
        <section class="home-separator" id="separador">
            <div class="wave-track" id="wave-track">
              <!-- Segment 0: Mirror -->
              <svg class="wave-segment wave-mirrored" viewBox="0 0 1440 252" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0L80.4 24C159.6 48 320.4 96 480 102C639.6 108 800.4 72 960 48C1119.6 24 1280.4 12 1359.6 6L1440 0V252H1359.6C1280.4 252 1119.6 252 960 252C800.4 252 639.6 252 480 252C320.4 252 159.6 252 80.4 252H0V0Z" fill="#2563EB"/>
              </svg>
              <!-- Segment 1: Normal (Starting point) -->
              <svg class="wave-segment" viewBox="0 0 1440 252" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0L80.4 24C159.6 48 320.4 96 480 102C639.6 108 800.4 72 960 48C1119.6 24 1280.4 12 1359.6 6L1440 0V252H1359.6C1280.4 252 1119.6 252 960 252C800.4 252 639.6 252 480 252C320.4 252 159.6 252 80.4 252H0V0Z" fill="#2563EB"/>
              </svg>
              <!-- Segment 2: Mirror -->
              <svg class="wave-segment wave-mirrored" viewBox="0 0 1440 252" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0L80.4 24C159.6 48 320.4 96 480 102C639.6 108 800.4 72 960 48C1119.6 24 1280.4 12 1359.6 6L1440 0V252H1359.6C1280.4 252 1119.6 252 960 252C800.4 252 639.6 252 480 252C320.4 252 159.6 252 80.4 252H0V0Z" fill="#2563EB"/>
              </svg>
              <!-- Segment 3: Normal -->
              <svg class="wave-segment" viewBox="0 0 1440 252" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0L80.4 24C159.6 48 320.4 96 480 102C639.6 108 800.4 72 960 48C1119.6 24 1280.4 12 1359.6 6L1440 0V252H1359.6C1280.4 252 1119.6 252 960 252C800.4 252 639.6 252 480 252C320.4 252 159.6 252 80.4 252H0V0Z" fill="#2563EB"/>
              </svg>
            </div>
        </section>

        <!-- Partial Content -->
        <section class="home-partial" id="contenido-parcial">
            <!-- HTMLs will be injected here -->
        </section>
    </main>

    <app-footer></app-footer>

    <script src="../js/background.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../webcomponents/toradora-bg.js"></script>
    <script src="./js/home.js"></script>
</body>
</html>
